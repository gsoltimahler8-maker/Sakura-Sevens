<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="サクラSVNS">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>サクラセブンズ SVNSトラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:#909090;--text3:#505050;
  --sakura:#e8607a;--sakura2:#c0435c;--sakura-dim:rgba(232,96,122,0.1);
  --up:#4caf7d;--down:#e05252;--neutral:#909090;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.header{padding:52px 18px 14px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.header-top{display:flex;align-items:center;gap:10px;}
.sakura-dot{width:8px;height:8px;border-radius:50%;background:var(--sakura);flex-shrink:0;}
.app-title{font-size:14px;font-weight:500;letter-spacing:0.06em;}
.app-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono);letter-spacing:0.08em;}
.tab-bar{display:flex;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--bg);}
.tab-btn{flex:1;padding:12px 2px;font-size:10px;font-weight:400;color:var(--text3);background:none;border:none;cursor:pointer;font-family:var(--sans);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;letter-spacing:0.03em;}
.tab-btn.active{color:var(--sakura);border-bottom-color:var(--sakura);}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.panel{display:none;padding:18px 16px 60px;}
.panel.active{display:block;}
.slabel{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-weight:500;}

/* Add tab */
.url-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:16px;}
.url-input{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-family:var(--sans);font-size:13px;margin-bottom:10px;}
.url-input:focus{outline:none;border-color:var(--sakura);}
.url-input::placeholder{color:var(--text3);}
.fetch-btn{width:100%;padding:12px;background:var(--sakura);border:none;border-radius:8px;color:#fff;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;}
.fetch-btn:disabled{opacity:0.4;cursor:not-allowed;}
.fetch-status{font-size:12px;color:var(--text2);margin-top:10px;min-height:18px;text-align:center;font-family:var(--mono);}

/* Match list */
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.filter-btn{font-size:11px;padding:5px 12px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);white-space:nowrap;flex-shrink:0;}
.filter-btn.active{background:var(--sakura);border-color:var(--sakura);color:#fff;}
.match-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;}
.match-card:active{border-color:var(--sakura);}
.match-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.match-comp{font-size:10px;color:var(--text3);font-family:var(--mono);}
.match-date{font-size:10px;color:var(--text3);font-family:var(--mono);}
.match-score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.team-name{font-size:12px;font-weight:500;flex:1;}
.team-japan{color:var(--sakura);}
.score-num{font-size:22px;font-weight:300;font-family:var(--mono);}
.score-win{color:var(--up);}
.score-loss{color:var(--down);}
.score-draw{color:var(--neutral);}
.vs-sep{font-size:11px;color:var(--text3);}
.mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.mini-stat{background:var(--bg3);border-radius:6px;padding:6px 4px;text-align:center;}
.mini-label{font-size:8px;color:var(--text3);margin-bottom:2px;letter-spacing:0.03em;}
.mini-val{font-size:13px;font-family:var(--mono);font-weight:500;}
.no-matches{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;line-height:2;}

/* Detail */
.back-btn{font-size:12px;color:var(--sakura);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:0 0 16px;display:flex;align-items:center;gap:6px;}
.detail-title{font-size:15px;font-weight:500;margin-bottom:3px;}
.detail-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:18px;}
.score-block{background:var(--bg2);border-radius:14px;padding:18px;margin-bottom:18px;text-align:center;border:0.5px solid var(--border);}
.big-score{font-size:40px;font-weight:300;font-family:var(--mono);letter-spacing:0.08em;}
.score-teams{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text2);}
.stats-group{margin-bottom:18px;}
.group-label{font-size:10px;color:var(--sakura);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:0.5px solid var(--sakura-dim);font-weight:500;}
.stat-row{display:flex;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);}
.stat-name{font-size:12px;color:var(--text2);flex:1;padding-right:8px;}
.stat-bars{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.snum{font-size:13px;font-family:var(--mono);font-weight:500;min-width:28px;text-align:right;}
.snum-j{color:var(--sakura);}
.snum-o{color:var(--text2);}
.bar-w{width:60px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.bar-f{height:100%;border-radius:2px;}
.bar-j{background:var(--sakura);}
.bar-o{background:var(--text3);}
.memo-area{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.7;resize:vertical;min-height:80px;}
.memo-area:focus{outline:none;border-color:var(--sakura);}
.memo-area::placeholder{color:var(--text3);}
.del-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px;margin-top:8px;width:100%;text-align:right;}
.del-btn:hover{color:var(--down);}

/* Summary */
.sum-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.sum-title{font-size:12px;font-weight:500;margin-bottom:12px;}
.avg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.avg-item{background:var(--bg3);border-radius:8px;padding:10px 12px;}
.avg-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
.avg-val{font-size:18px;font-family:var(--mono);}
.avg-val.hl{color:var(--sakura);}
.chart-wrap{position:relative;width:100%;height:180px;}
.opp-filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.opp-btn{font-size:10px;padding:4px 10px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.opp-btn.active{background:var(--sakura);border-color:var(--sakura);color:#fff;}
.chart-selector{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.cs-btn{font-size:10px;padding:4px 10px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--mono);}
.cs-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2);}
.result-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.r-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;min-width:24px;text-align:center;}
.r-win{background:rgba(76,175,125,0.15);color:#4caf7d;border:0.5px solid rgba(76,175,125,0.3);}
.r-loss{background:rgba(224,82,82,0.15);color:#e05252;border:0.5px solid rgba(224,82,82,0.3);}
.r-draw{background:rgba(144,144,144,0.15);color:#909090;border:0.5px solid rgba(144,144,144,0.3);}
.r-opp{flex:1;color:var(--text2);}
.r-score{font-family:var(--mono);}
.r-date{font-size:10px;color:var(--text3);font-family:var(--mono);}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
.pulse{animation:pulse 1s infinite;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fi{animation:fi .2s ease;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="sakura-dot"></div>
      <div>
        <div class="app-title">サクラセブンズ SVNS</div>
        <div class="app-sub">STATS TRACKER</div>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('matches')">試合記録</button>
    <button class="tab-btn" onclick="switchTab('summary')">グラフ分析</button>
    <button class="tab-btn" onclick="switchTab('add')">追加</button>
  </div>
  <div class="content">

    <!-- MATCHES -->
    <div id="panel-matches" class="panel active">
      <div id="match-detail" style="display:none;"></div>
      <div id="match-list">
        <p class="slabel">試合一覧</p>
        <div class="filter-row" id="opp-filter-list"></div>
        <div id="matches-container"></div>
      </div>
    </div>

    <!-- SUMMARY -->
    <div id="panel-summary" class="panel">
      <p class="slabel">対戦相手フィルター</p>
      <div class="opp-filter-row" id="chart-opp-filter"></div>

      <div class="sum-card">
        <div class="sum-title">日本 平均スタッツ</div>
        <div class="avg-grid" id="avg-grid"></div>
      </div>

      <div class="sum-card">
        <div class="chart-selector" id="chart-selector"></div>
        <div class="chart-wrap"><canvas id="mainChartCanvas" role="img" aria-label="スタッツ推移グラフ">スタッツ推移グラフ</canvas></div>
      </div>

      <div class="sum-card">
        <div class="sum-title">レーダー比較（日本 vs 相手平均）</div>
        <div class="chart-wrap" style="height:220px;"><canvas id="radarCanvas" role="img" aria-label="レーダーチャート">レーダーチャート</canvas></div>
      </div>

      <p class="slabel" style="margin-top:8px;">全試合結果</p>
      <div class="sum-card"><div id="results-list"></div></div>
    </div>

    <!-- ADD -->
    <div id="panel-add" class="panel">
      <p class="slabel">スタッツを貼り付けて追加</p>
      <div class="url-box">
        <textarea class="url-input" id="json-input" rows="8" placeholder='ClaudeからコピーしたJSONをここに貼り付けてください。複数試合まとめて貼り付けもOKです。

例：
[{"competition":"SVNS HK","date":"2026-04-19",...},
 {"competition":"SVNS HK","date":"2026-04-19",...}]

または単一試合：
{"competition":"SVNS HK",...}' style="resize:vertical;font-size:12px;font-family:var(--mono);min-height:140px;"></textarea>
        <button class="fetch-btn" style="margin-top:10px;" onclick="importJSON()">記録する</button>
        <div class="fetch-status" id="fetch-status"></div>
      </div>

      <div style="background:var(--bg3);border-radius:10px;padding:14px;margin-top:4px;">
        <p style="font-size:11px;color:var(--sakura);font-weight:500;margin-bottom:8px;">使い方</p>
        <p style="font-size:12px;color:var(--text2);line-height:1.9;">
          ① rugby.com.auの試合URLを<br>　 Claude.aiに送る<br>
          ② ClaudeがJSONを返す<br>
          ③ そのJSONをここに貼り付けて「記録する」<br><br>
          複数URLをまとめてClaudeに送ればまとめて取得できます。
        </p>
      </div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── Storage ──────────────────────────────
function load(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function save(k,v){try{localStorage.setItem(k,v);}catch(e){}}
let matches=[];
try{matches=JSON.parse(load('sakura_v2')||'[]');}catch(e){}
function saveMatches(){save('sakura_v2',JSON.stringify(matches));}

// ── Tab ──────────────────────────────────
function switchTab(name){
  ['matches','summary','add'].forEach(t=>{
    document.getElementById('panel-'+t).classList.toggle('active',t===name);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['matches','summary','add'][i]===name);
  });
  if(name==='matches'){showMatchList();renderMatches();}
  if(name==='summary'){renderSummary();}
}

// ── Opponents list ────────────────────────
function getOpponents(){
  const set=new Set(matches.map(m=>m.opponent).filter(Boolean));
  return ['全試合',...set];
}

// ── Match list ────────────────────────────
let activeOppFilter='全試合';
function renderOppFilter(){
  const opps=getOpponents();
  const el=document.getElementById('opp-filter-list');
  el.innerHTML=opps.map(o=>`<button class="filter-btn${o===activeOppFilter?' active':''}" onclick="setOppFilter('${o}')">${o}</button>`).join('');
}
function setOppFilter(opp){
  activeOppFilter=opp;
  renderOppFilter();
  renderMatches();
}
function renderMatches(){
  renderOppFilter();
  const filtered=activeOppFilter==='全試合'?matches:matches.filter(m=>m.opponent===activeOppFilter);
  const c=document.getElementById('matches-container');
  if(!filtered.length){
    c.innerHTML='<div class="no-matches">試合がありません。<br>「追加」タブからURLを貼り付けてください。</div>';
    return;
  }
  c.innerHTML=filtered.map((m,i)=>{
    const idx=matches.indexOf(m);
    const js=m.japan_stats||{};
    const rCls={win:'score-win',loss:'score-loss',draw:'score-draw'};
    return `<div class="match-card fi" onclick="showDetail(${idx})">
      <div class="match-header">
        <span class="match-comp">${m.competition||'—'}</span>
        <span class="match-date">${m.date||'—'}</span>
      </div>
      <div class="match-score-row">
        <span class="team-name team-japan">日本</span>
        <span class="score-num ${rCls[m.result]||''}">${m.japan_score}</span>
        <span class="vs-sep">—</span>
        <span class="score-num ${m.result==='win'?'score-loss':m.result==='loss'?'score-win':'score-draw'}">${m.opp_score}</span>
        <span class="team-name" style="text-align:right;font-size:11px">${m.opponent||'—'}</span>
      </div>
      <div class="mini-grid">
        <div class="mini-stat"><div class="mini-label">DB</div><div class="mini-val">${js.defenders_beaten??'—'}</div></div>
        <div class="mini-stat"><div class="mini-label">CB</div><div class="mini-val">${js.clean_breaks??'—'}</div></div>
        <div class="mini-stat"><div class="mini-label">MT</div><div class="mini-val">${js.missed_tackles??'—'}</div></div>
        <div class="mini-stat"><div class="mini-label">PEN</div><div class="mini-val">${js.penalties_conceded??'—'}</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── Detail ────────────────────────────────
function showDetail(idx){
  const m=matches[idx];
  const detail=document.getElementById('match-detail');
  document.getElementById('match-list').style.display='none';
  detail.style.display='block';
  const js=m.japan_stats||{};
  const os=m.opponent_stats||{};
  function sr(label,jv,ov){
    const max=Math.max(jv||0,ov||0,1);
    const jp=Math.round(((jv||0)/max)*100);
    const op=Math.round(((ov||0)/max)*100);
    const jd=jv!=null?jv:'—';const od=ov!=null?ov:'—';
    return `<div class="stat-row">
      <span class="stat-name">${label}</span>
      <div class="stat-bars">
        <span class="snum snum-o">${od}</span>
        <div class="bar-w" style="transform:scaleX(-1)"><div class="bar-f bar-o" style="width:${op}%"></div></div>
        <div class="bar-w"><div class="bar-f bar-j" style="width:${jp}%"></div></div>
        <span class="snum snum-j">${jd}</span>
      </div>
    </div>`;
  }
  const convJ=js.conversions||'—'; const convO=os.conversions||'—';
  detail.innerHTML=`
    <button class="back-btn" onclick="showMatchList()">← 試合一覧</button>
    <div class="detail-title">${m.competition||'—'}</div>
    <div class="detail-meta">${m.date||'—'} ／ vs ${m.opponent||'—'}</div>
    <div class="score-block">
      <div class="big-score"><span style="color:var(--sakura)">${m.japan_score}</span><span style="color:var(--text3);font-size:24px;margin:0 8px">—</span><span style="color:var(--text2)">${m.opp_score}</span></div>
      <div class="score-teams"><span style="color:var(--sakura)">日本</span><span>${m.opponent||'相手'}</span></div>
    </div>
    <div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:12px;font-family:var(--mono);">← 相手 ／ 日本 →</div>
    <div class="stats-group">
      <div class="group-label">Attack</div>
      ${sr('Tries',js.tries,os.tries)}
      ${sr('Metres',js.metres,os.metres)}
      ${sr('Carries',js.carries,os.carries)}
      ${sr('Defenders Beaten',js.defenders_beaten,os.defenders_beaten)}
      ${sr('Clean Breaks',js.clean_breaks,os.clean_breaks)}
      ${sr('Passes',js.passes,os.passes)}
      ${sr('Offloads',js.offloads,os.offloads)}
      ${sr('Turnovers Conceded',js.turnovers_conceded,os.turnovers_conceded)}
    </div>
    <div class="stats-group">
      <div class="group-label">Defence</div>
      ${sr('Tackles',js.tackles,os.tackles)}
      ${sr('Missed Tackles',js.missed_tackles,os.missed_tackles)}
      ${sr('Turnovers Won',js.turnovers_won,os.turnovers_won)}
    </div>
    <div class="stats-group">
      <div class="group-label">Kicking</div>
      ${sr('Kicks in Play',js.kicks_in_play,os.kicks_in_play)}
      ${sr('Kick Metres',js.kick_metres,os.kick_metres)}
      ${sr('Conversions Made',js.conversions_made,os.conversions_made)}
      ${sr('Charged Down',js.charged_down,os.charged_down)}
    </div>
    <div class="stats-group">
      <div class="group-label">Discipline</div>
      ${sr('Penalties Conceded',js.penalties_conceded,os.penalties_conceded)}
      ${sr('Yellow Cards',js.yellow_cards,os.yellow_cards)}
      ${sr('Red Cards',js.red_cards,os.red_cards)}
    </div>
    <div style="margin-top:8px;">
      <p class="slabel">メモ</p>
      <textarea class="memo-area" placeholder="戦術メモ・所感..." oninput="saveMemo(${idx},this.value)">${m.memo||''}</textarea>
    </div>
    <button class="del-btn" onclick="deleteMatch(${idx})">この試合を削除</button>
  `;
}
function showMatchList(){
  document.getElementById('match-detail').style.display='none';
  document.getElementById('match-list').style.display='block';
}
function saveMemo(idx,val){matches[idx].memo=val;saveMatches();}
function deleteMatch(idx){
  if(!confirm('削除しますか？'))return;
  matches.splice(idx,1);saveMatches();showMatchList();renderMatches();
}

// ── Summary / Charts ──────────────────────
let chartOppFilter='全試合';
let activeChartKey='defenders_beaten';
let mainChart=null,radarChart=null;

const CHART_KEYS=[
  {key:'defenders_beaten',label:'DB'},
  {key:'clean_breaks',label:'CB'},
  {key:'metres',label:'Metres'},
  {key:'carries',label:'Carries'},
  {key:'passes',label:'Passes'},
  {key:'offloads',label:'Offloads'},
  {key:'tackles',label:'Tackles'},
  {key:'missed_tackles',label:'Miss Tkl'},
  {key:'turnovers_won',label:'TO Won'},
  {key:'turnovers_conceded',label:'TO Lost'},
  {key:'penalties_conceded',label:'Penalties'},
];

function filteredMatches(){
  return chartOppFilter==='全試合'?[...matches]:matches.filter(m=>m.opponent===chartOppFilter);
}

function avg(arr,key){
  const vals=arr.map(m=>m.japan_stats?.[key]).filter(v=>v!=null&&!isNaN(v));
  return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):null;
}
function avgOpp(arr,key){
  const vals=arr.map(m=>m.opponent_stats?.[key]).filter(v=>v!=null&&!isNaN(v));
  return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):null;
}

function renderSummary(){
  const opps=getOpponents();
  // Opp filter
  document.getElementById('chart-opp-filter').innerHTML=opps.map(o=>`<button class="opp-btn${o===chartOppFilter?' active':''}" onclick="setChartOpp('${o}')">${o}</button>`).join('');
  // Chart selector
  document.getElementById('chart-selector').innerHTML=CHART_KEYS.map(c=>`<button class="cs-btn${c.key===activeChartKey?' active':''}" onclick="setChartKey('${c.key}')">${c.label}</button>`).join('');

  const fm=filteredMatches();
  if(!fm.length){
    document.getElementById('avg-grid').innerHTML='<p style="font-size:12px;color:var(--text3);grid-column:span 2;padding:8px 0;">データなし</p>';
    document.getElementById('results-list').innerHTML='';
    return;
  }

  // Avg grid
  const avgItems=[
    ['DB',avg(fm,'defenders_beaten')],['CB',avg(fm,'clean_breaks')],
    ['Metres',avg(fm,'metres')],['Carries',avg(fm,'carries')],
    ['Passes',avg(fm,'passes')],['Offloads',avg(fm,'offloads')],
    ['Tackles',avg(fm,'tackles')],['Miss Tkl',avg(fm,'missed_tackles')],
    ['TO Won',avg(fm,'turnovers_won')],['TO Lost',avg(fm,'turnovers_conceded')],
    ['Penalties',avg(fm,'penalties_conceded')],['Kicks',avg(fm,'kicks_in_play')],
  ];
  document.getElementById('avg-grid').innerHTML=avgItems.map(([l,v])=>`
    <div class="avg-item">
      <div class="avg-label">${l}</div>
      <div class="avg-val${['DB','CB','TO Won'].includes(l)?' hl':''}">${v!=null?v.toFixed(1):'—'}</div>
    </div>`).join('');

  // Line chart
  renderMainChart(fm);
  // Radar
  renderRadar(fm);
  // Results
  const rCls={win:'r-win',loss:'r-loss',draw:'r-draw'};
  const rLbl={win:'W',loss:'L',draw:'D'};
  document.getElementById('results-list').innerHTML=fm.map(m=>`
    <div class="result-row">
      <span class="r-badge ${rCls[m.result]||''}">${rLbl[m.result]||'—'}</span>
      <span class="r-opp">${m.opponent||'—'}</span>
      <span class="r-score">${m.japan_score}–${m.opp_score}</span>
      <span class="r-date" style="margin-left:6px">${(m.date||'').slice(5)}</span>
    </div>`).join('');
}

function setChartOpp(o){chartOppFilter=o;renderSummary();}
function setChartKey(k){activeChartKey=k;renderSummary();}

function getTournamentOrder(comp){
  if(comp.includes('Dubai')) return 1;
  if(comp.includes('Cape Town')) return 2;
  if(comp.includes('Singapore')) return 3;
  if(comp.includes('Perth')) return 4;
  if(comp.includes('Vancouver')) return 5;
  if(comp.includes('New York')) return 6;
  if(comp.includes('Hong Kong')) return 7;
  return 8;
}
function getTournamentLabel(comp){
  if(comp.includes('Dubai')) return 'Dubai';
  if(comp.includes('Cape Town')) return 'Cape Town';
  if(comp.includes('Singapore')) return 'Singapore';
  if(comp.includes('Perth')) return 'Perth';
  if(comp.includes('Vancouver')) return 'Vancouver';
  if(comp.includes('New York')) return 'New York';
  if(comp.includes('Hong Kong')) return '香港WC';
  return comp;
}

function renderMainChart(fm){
  const ctx=document.getElementById('mainChartCanvas').getContext('2d');
  if(mainChart)mainChart.destroy();

  // Group by tournament and compute averages
  const groups={};
  fm.forEach(m=>{
    const label=getTournamentLabel(m.competition||'');
    const order=getTournamentOrder(m.competition||'');
    if(!groups[label]) groups[label]={order,jVals:[],oVals:[]};
    const jv=m.japan_stats?.[activeChartKey];
    const ov=m.opponent_stats?.[activeChartKey];
    if(jv!=null&&!isNaN(jv)) groups[label].jVals.push(jv);
    if(ov!=null&&!isNaN(ov)) groups[label].oVals.push(ov);
  });
  const sorted=Object.entries(groups).sort((a,b)=>a[1].order-b[1].order);
  const labels=sorted.map(([l])=>l);
  const avg=arr=>arr.length?parseFloat((arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1)):null;
  const jData=sorted.map(([,g])=>avg(g.jVals));
  const oData=sorted.map(([,g])=>avg(g.oVals));
  mainChart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'日本',data:jData,borderColor:'#e8607a',backgroundColor:'rgba(232,96,122,0.08)',borderWidth:2,pointRadius:4,fill:true,tension:0.3},
        {label:'相手',data:oData,borderColor:'#505050',backgroundColor:'transparent',borderWidth:1.5,pointRadius:3,borderDash:[4,4],tension:0.3}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#505050',font:{size:9},maxRotation:40}},
        y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#505050',font:{size:10}},beginAtZero:true}
      }
    }
  });
}

function renderRadar(fm){
  const ctx=document.getElementById('radarCanvas').getContext('2d');
  if(radarChart)radarChart.destroy();
  const keys=['defenders_beaten','clean_breaks','tackles','turnovers_won','offloads'];
  const labels=['DB','CB','Tackles','TO Won','Offloads'];
  const jVals=keys.map(k=>avg(fm,k)??0);
  const oVals=keys.map(k=>avgOpp(fm,k)??0);
  radarChart=new Chart(ctx,{
    type:'radar',
    data:{
      labels,
      datasets:[
        {label:'日本',data:jVals,borderColor:'#e8607a',backgroundColor:'rgba(232,96,122,0.15)',borderWidth:2,pointRadius:3},
        {label:'相手',data:oVals,borderColor:'#505050',backgroundColor:'rgba(80,80,80,0.1)',borderWidth:1.5,pointRadius:2,borderDash:[3,3]}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{r:{grid:{color:'rgba(255,255,255,0.06)'},angleLines:{color:'rgba(255,255,255,0.06)'},ticks:{display:false},pointLabels:{color:'#909090',font:{size:10}}}}
    }
  });
}

// ── Import JSON ───────────────────────────
function importJSON(){
  const raw=document.getElementById('json-input').value.trim();
  const st=document.getElementById('fetch-status');
  if(!raw){ st.textContent='JSONを貼り付けてください'; return; }
  try{
    const clean=raw.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    const items=Array.isArray(parsed)?parsed:[parsed];
    let count=0;
    items.forEach(p=>{
      const japanScore=p.japan_is_home?p.home_score:p.away_score;
      const oppScore=p.japan_is_home?p.away_score:p.home_score;
      const result=japanScore>oppScore?'win':japanScore<oppScore?'loss':'draw';
      matches.unshift({
        id:Date.now()+count,
        url:p.url||'',
        competition:p.competition||'',
        date:p.date||'',
        opponent:p.opponent_name||p.opponent||'',
        japan_score:japanScore,
        opp_score:oppScore,
        result,
        japan_stats:p.japan_stats||{},
        opponent_stats:p.opponent_stats||{},
        memo:''
      });
      count++;
    });
    saveMatches();
    document.getElementById('json-input').value='';
    st.textContent=`✓ ${count}試合を記録しました`;
    setTimeout(()=>{st.textContent='';},3000);
    switchTab('matches');
  }catch(e){
    st.textContent='JSONの形式が正しくありません。Claudeからコピーしたものをそのまま貼り付けてください。';
    console.error(e);
  }
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/Sakura-Sevens/sw.js').catch(()=>{});}
renderMatches();
